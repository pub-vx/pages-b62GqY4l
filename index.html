<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>골프 가격조정 자동화 성과보고서</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1f2e 0%, #151a27 100%); padding: 16px 30px 14px; border-bottom: 1px solid #2a3142; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; margin-bottom: 12px; }
.controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.mode-toggle { display: inline-flex; background: #0d1220; border: 1px solid #2a3142; border-radius: 8px; padding: 3px; }
.mode-btn { padding: 7px 14px; background: transparent; color: #94a3b8; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; }
.mode-btn.active { background: #334155; color: #f1f5f9; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab { padding: 9px 18px; background: #1e2433; color: #94a3b8; border: 1px solid #2a3142; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; user-select: none; }
.tab:hover { background: #2a3142; color: #cbd5e1; }
.tab.active { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; border-color: #f59e0b; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25); }
.tab .tag { font-size: 10px; background: rgba(0,0,0,0.25); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.frame-wrap { height: calc(100vh - 110px); }
iframe { width: 100%; height: 100%; border: none; background: #0a0e1a; }
.mode-label { color: #64748b; font-size: 12px; font-weight: 500; }
</style>
</head>
<body>
<div class="header">
  <h1>🏌️ 골프 가격조정 자동화 — 기간별 성과보고서</h1>
  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="all">전체 (주말 포함)</button>
      <button class="mode-btn" data-mode="weekday">평일만 (월~금)</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-period="최근_2주">최근 2주<span class="tag">2026-03-27~</span></div>
      <div class="tab" data-period="3.0_이후">v3.0 배포 이후<span class="tag">2026-03-09~</span></div>
      <div class="tab" data-period="2.0_이후">v2.0 배포 이후<span class="tag">2025-12-11~</span></div>
    </div>
  </div>
</div>
<div class="frame-wrap">
  <iframe id="report" src="최근_2주.html"></iframe>
</div>
<script>
let currentMode = 'all';
let currentPeriod = '최근_2주';

function updateFrame() {
  const suffix = currentMode === 'weekday' ? '_평일' : '';
  document.getElementById('report').src = currentPeriod + suffix + '.html';
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    updateFrame();
  });
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentPeriod = tab.dataset.period;
    updateFrame();
  });
});
</script>
</body>
</html>
